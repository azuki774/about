name: Docker Build

on:
  pull_request:
    paths:
      - 'Dockerfile'
      - '.dockerignore'
      - 'about/**'
      - '.github/workflows/docker-build.yml'

jobs:
  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t about:test .
